<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mi Sitio{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <nav class="navbar navbar-expand-lg navbar-light bg-light">
                <a class="navbar-brand" href="{% url 'myapp:index' %}">Inicio</a>
                <a class="navbar-brand" href="{% url 'myapp:estudiantes' %}">Estudiantes</a>
                <a class="navbar-brand" href="{% url 'myapp:profesores' %}">Profesores</a>
                <a class="navbar-brand" href="{% url 'myapp:cursos' %}">Cursos</a>
                <a class="navbar-brand" href="{% url 'myapp:entregables' %}">Entregables</a>            </nav>
        </div>
    </header>
    
    <main class="container mt-4">
        {% block content %}
        <!-- Contenido específico de cada página irá aquí -->
        {% endblock %}
    </main>
    
    <footer class="container mt-4">
        <p>&copy; 2025 Mi Sitio</p>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
